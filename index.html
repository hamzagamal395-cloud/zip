<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>زبير Hub</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#310dfd;
    color:white;
}

header{
    text-align:center;
    padding:25px;
    background:rgba(0,0,0,0.2);
}

header h1{
    margin:0;
    font-size:40px;
}

.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.card{
    width:350px;
    background:white;
    color:black;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.card img,
.card video{
    width:100%;
    display:block;
}

.description{
    padding:15px;
}
</style>
</head>

<body>

<header>
    <h1>زبير Hub</h1>
    <p>لو عايز لبن عشاري اتصل بي (لسه بشوف هحط رقم مين)</p>
</header>

<div class="gallery">

    <!-- صورة -->
    <div class="card">
        <img src="se.jpg" alt="se.jpg">
        <div class="description">
            <h3>سكس ساخن جداااا</h3>
            <p>سكس اطفال لاجل عباس دي وترسون.</p>
        </div>
    </div>
        <!-- صورة -->
    <div class="card">
        <img src="br.jpg" alt="se.jpg">
        <div class="description">
            <h3>براري يوضاجع </h3>
            <p>اسرع واحد يجبهم في مصر</p>
        </div>
    </div>

    <!-- فيديو -->
    <div class="card">
        <video controls>
            <source src="se.mp4" type="video/mp4">
        </video>
        <div class="description">
            <h3>سكس ساخن جداااا</h3>
            <p>سكس اطفال لاجل عباس دي وترسون.</p>
        </div>
    </div>

</div>

</body>
</html>
